apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-puzzle-solver-frontend
  labels:
    app: ai-puzzle-solver-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-puzzle-solver-frontend
  template:
    metadata:
      labels:
        app: ai-puzzle-solver-frontend
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: frontend
          image: docker.io/harudavv/mazeai-showcases:ai-puzzle-solver-frontend-fb96734
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
