apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-puzzle-solver-backend
  labels:
    app: ai-puzzle-solver-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-puzzle-solver-backend
  template:
    metadata:
      labels:
        app: ai-puzzle-solver-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 0
      containers:
        - name: backend
          image: docker.io/harudavv/mazeai-showcases:ai-puzzle-solver-backend-547337bdbd93fef838e21e7a60477130b330b161
          ports:
            - containerPort: 8008
              protocol: TCP
          envFrom:
            - secretRef:
                name: ai-puzzle-solver-secrets
          env:
            - name: DEEPFACE_HOME
              value: /opt/deepface_cache
            - name: HF_HOME
              value: /tmp/hf_cache
            - name: TORCH_HOME
              value: /tmp/torch_cache
            - name: TRANSFORMERS_CACHE
              value: /tmp/hf_cache
            - name: SENTENCE_TRANSFORMERS_HOME
              value: /tmp/hf_cache
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "6Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8008
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8008
            initialDelaySeconds: 360
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: hf-cache
              mountPath: /tmp/hf_cache
            - name: model-cache
              mountPath: /tmp/deepface_cache
      volumes:
        - name: hf-cache
          emptyDir: {}
        - name: model-cache
          emptyDir: {}
