apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-puzzle-solver-backend
spec:
  replicas: 1
  template:
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: backend
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "6Gi"
