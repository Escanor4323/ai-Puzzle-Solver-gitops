apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-puzzle-solver-prod

resources:
  - ../../base

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: ai-puzzle-solver-backend
  - path: frontend-deployment-patch.yaml
    target:
      kind: Deployment
      name: ai-puzzle-solver-frontend

# CI updates this block automatically via the update-gitops job.
# The image name here matches the container name in base/deployment.yaml.
images:
  - name: harudavv/mazeai-showcases
    newTag: ai-puzzle-solver-backend-latest
